<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindsense AI</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:black;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle,#00eaff33,transparent);
      animation:pulse 4s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.2);}
      100%{transform:scale(1);}
    }

    h1{
      font-size:70px;
      z-index:2;
      color:#00eaff;
      text-shadow:0 0 30px #00eaff;
    }

    p{
      margin-top:20px;
      max-width:700px;
      z-index:2;
      font-size:20px;
      color:#ddd;
    }

    button{
      margin-top:40px;
      padding:15px 40px;
      font-size:18px;
      border:none;
      border-radius:50px;
      cursor:pointer;

      background:linear-gradient(90deg,#00eaff,#6c63ff);
      color:white;

      z-index:2;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.08);
      box-shadow:0 0 25px #00eaff;
    }

  </style>
</head>

<body>

  <h1>MINDSENSE AI</h1>

  <p>
    Experience the futuristic AI chatbot developed by
    certified by Google Abhay Gupta .
  </p>

  <button onclick="window.location.href='chat.html'">
    Launch AI
  </button>

</body>
</html>
